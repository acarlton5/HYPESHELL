# █ Window Rules (Updated for 0.53.0+ Syntax)

# Browsers
windowrule = match:class ^(firefox|Google-chrome|Brave-browser)$, opacity 0.90 0.90

# Terminals / editors / file managers
windowrule = match:class ^(kitty|code-oss|[Cc]ode|code-url-handler|code-insiders-url-handler|org.kde.dolphin|org.kde.ark)$, opacity 0.80 0.80

# Theme tools
windowrule = match:class ^(nwg-look|qt5ct|qt6ct|kvantummanager)$, opacity 0.80 0.80

# System utilities
windowrule = match:class ^(org.pulseaudio.pavucontrol|blueman-manager|nm-applet|nm-connection-editor)$, opacity 0.80 0.70
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1|polkit-gnome-authentication-agent-1)$, opacity 0.80 0.70

# Steam / Spotify
windowrule = match:class ^([Ss]team|steamwebhelper|[Ss]potify)$, opacity 0.70 0.70
windowrule = match:title ^(Spotify Free|Spotify Premium)$, opacity 0.70 0.70

# █ Floating windows (Note the 'float on' syntax)
windowrule = match:class ^(org.kde.dolphin)$ match:title ^(Progress Dialog — Dolphin|Copying — Dolphin)$, float on
windowrule = match:title ^(About Mozilla Firefox)$, float on
windowrule = match:class ^(firefox)$ match:title ^(Picture-in-Picture|Library)$, float on
windowrule = match:class ^(vlc|kvantummanager|qt5ct|qt6ct|nwg-look)$, float on
windowrule = match:class ^(org.kde.ark|org.pulseaudio.pavucontrol|blueman-manager)$, float on
windowrule = match:class ^(nm-applet|nm-connection-editor|org.kde.polkit-kde-authentication-agent-1)$, float on
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on

# Common dialogs
windowrule = match:title ^(Open|Choose Files|Save As)$, float on
windowrule = match:title ^(Confirm to replace files|File Operation Progress)$, float on

# █ Blur for Hyprlauncher
layerrule = blur namespace:^(hyprlauncher)$

# █ DSS Workspace full panel (qml6 WebEngineView — special:dss-panel workspace)
windowrule = match:class ^(org.qt-project.qml)$, float on
windowrule = match:class ^(org.qt-project.qml)$, size 100% 100%
windowrule = match:class ^(org.qt-project.qml)$, move 0 0


