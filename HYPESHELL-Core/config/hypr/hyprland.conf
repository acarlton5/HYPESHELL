
$scrPath = $HOME/.local/bin

# --- MONITORS ---
# Default: Automatically detect preferred resolution and position.
monitor=,preferred,auto,1

# Developer specific rules (Commented out for installer safety)
# Laptop Screen
# monitor=eDP-1, 2256x1504@60, 0x0, 2

# MSI Monitors
# monitor=desc:Microstep MSI G32C4X, 1920x1080@60, auto, 1
# --- AUTOSTART ---
exec-once = $scrPath/resetxdgportal.sh
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
exec-once = sh -lc 'if command -v qs >/dev/null 2>&1; then exec qs -c hype-shell; elif command -v quickshell >/dev/null 2>&1; then exec quickshell -c hype-shell; fi'
exec-once = blueman-applet
exec-once = udiskie --no-automount --smart-tray
exec-once = nm-applet --indicator
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store
exec-once = $scrPath/swwwallpaper.sh
exec-once = $scrPath/batterynotify.sh

# --- ENVIRONMENT VARIABLES ---
env = PATH,$PATH:$scrPath
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_SCALE,1
# Disables "modifiers" which can break handshakes on older Thunderbolt docks
env = AQ_NO_MODIFIERS,1
# Forces the kernel to use a simpler sync method
env = WLR_DRM_NO_ATOMIC,1
# Fix for AMD Panel Self Refresh flickering/blackouts
env = AMD_DEBUG,nopsr
# --- INPUT ---
input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0
    # UPDATED: force_no_accel is deprecated. Use accel_profile instead.
    accel_profile = flat
    numlock_by_default = true
}



# --- LAYOUTS ---
dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    # UPDATED: Syntax for master layout status
    new_status = master 
}

# --- MISC & XWAYLAND ---
misc {
    vrr = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    # Adding this to prevent focus issues with some apps
    initial_workspace_tracking = false 
}

xwayland {
    force_zero_scaling = true
}

# --- SOURCES ---
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/themes/common.conf 
source = ~/.config/hypr/themes/theme.conf 
source = ~/.config/hypr/themes/colors.conf 
source = ~/.config/hypr/monitors.conf 
source = ~/.config/hypr/userprefs.conf
